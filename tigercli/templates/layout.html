<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerLiteCode - {% block title %}Coding Agent{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tiger.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">{% block sidebar %}{% endblock %}</aside>
        <main id="main">{% block content %}{% endblock %}</main>
        <footer id="statusbar">{% block status %}{% endblock %}</footer>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/diff.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
