<div class="sidebar-header">
    <div class="sidebar-logo">TigerLiteCode</div>
    <button class="btn-icon" onclick="newSession()" title="New Session">+</button>
</div>
<div class="sidebar-actions">
    <button class="sidebar-action" onclick="showProjectPicker()">
        <span>📁</span> Open Project
    </button>
    <button class="sidebar-action" onclick="window.location.href='/settings'">
        <span>⚙</span> Settings
    </button>
</div>
<div class="sidebar-section-label">Sessions</div>
<div class="session-list" id="session-list">
    {% for s in sessions %}
    <div class="session-item" data-id="{{ s.id }}" onclick="switchSession('{{ s.id }}')">
        <div class="session-title">{{ s.title or '(untitled)' }}</div>
        <div class="session-meta">
            <span class="model-badge">{{ s.model.rsplit('/', 1)[-1][:18] }}</span>
            <span class="session-time">{{ s.updated_at[:10] }}</span>
        </div>
    </div>
    {% endfor %}
</div>
